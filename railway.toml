[build]
builder = "nixpacks"
buildCommand = "npm install && cd packages/db && npx prisma generate && npx tsc && cd ../../apps/api && npm run build"

[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 20260421000000_ensure_complete_schema --schema=packages/db/prisma/schema.prisma 2>/dev/null; npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma && node apps/api/dist/index.js"
healthcheckPath = "/api/health"
